services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: truthmarket_test
      POSTGRES_PASSWORD: truthmarket_test
      POSTGRES_DB: truthmarket_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truthmarket_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
