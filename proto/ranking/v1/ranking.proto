syntax = "proto3";

package ranking.v1;

option go_package = "github.com/truthmarket/truth-market/proto/gen/go/ranking/v1;rankingv1";

import "google/protobuf/timestamp.proto";

service RankingService {
  rpc GetLeaderboard(GetLeaderboardRequest) returns (GetLeaderboardResponse);
  rpc GetUserRanking(GetUserRankingRequest) returns (GetUserRankingResponse);
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc RefreshRankings(RefreshRankingsRequest) returns (RefreshRankingsResponse);
}

message GetLeaderboardRequest {
  RankDimension dimension = 1;
  UserTypeFilter user_type = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message GetLeaderboardResponse {
  repeated UserRanking rankings = 1;
  int64 total = 2;
}

message GetUserRankingRequest {
  string user_id = 1;
}

message GetUserRankingResponse {
  repeated DimensionRank ranks = 1;
}

message DimensionRank {
  RankDimension dimension = 1;
  int64 rank = 2;
  string value = 3;
}

message GetPortfolioRequest {
  string user_id = 1;
}

message GetPortfolioResponse {
  string total_value = 1;
  string unrealized_pnl = 2;
  repeated PortfolioPosition positions = 3;
}

message PortfolioPosition {
  string market_id = 1;
  string market_title = 2;
  string outcome_id = 3;
  string outcome_label = 4;
  string quantity = 5;
  string avg_price = 6;
  string current_price = 7;
  string unrealized_pnl = 8;
}

message RefreshRankingsRequest {}

message RefreshRankingsResponse {
  int64 updated_count = 1;
}

enum RankDimension {
  RANK_DIMENSION_UNSPECIFIED = 0;
  RANK_DIMENSION_TOTAL_ASSETS = 1;
  RANK_DIMENSION_PNL = 2;
  RANK_DIMENSION_VOLUME = 3;
  RANK_DIMENSION_WIN_RATE = 4;
}

enum UserTypeFilter {
  USER_TYPE_FILTER_UNSPECIFIED = 0;
  USER_TYPE_FILTER_ALL = 1;
  USER_TYPE_FILTER_HUMAN = 2;
  USER_TYPE_FILTER_AGENT = 3;
}

message UserRanking {
  string user_id = 1;
  string wallet_address = 2;
  string user_type = 3;
  int64 rank = 4;
  string value = 5;
  google.protobuf.Timestamp updated_at = 6;
}
