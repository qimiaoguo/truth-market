syntax = "proto3";

package auth.v1;

option go_package = "github.com/truthmarket/truth-market/proto/gen/go/auth/v1;authv1";

import "google/protobuf/timestamp.proto";

service AuthService {
  rpc GenerateNonce(GenerateNonceRequest) returns (GenerateNonceResponse);
  rpc VerifySignature(VerifySignatureRequest) returns (VerifySignatureResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ValidateAPIKey(ValidateAPIKeyRequest) returns (ValidateAPIKeyResponse);
  rpc CreateAPIKey(CreateAPIKeyRequest) returns (CreateAPIKeyResponse);
  rpc RevokeAPIKey(RevokeAPIKeyRequest) returns (RevokeAPIKeyResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message GenerateNonceRequest {}

message GenerateNonceResponse {
  string nonce = 1;
}

message VerifySignatureRequest {
  string message = 1;
  string signature = 2;
  string wallet_address = 3;
}

message VerifySignatureResponse {
  User user = 1;
  string token = 2;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  User user = 1;
}

message ValidateAPIKeyRequest {
  string api_key = 1;
}

message ValidateAPIKeyResponse {
  User user = 1;
}

message CreateAPIKeyRequest {
  string user_id = 1;
  string label = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message CreateAPIKeyResponse {
  string key = 1;
  string key_prefix = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message RevokeAPIKeyRequest {
  string user_id = 1;
  string key_prefix = 2;
}

message RevokeAPIKeyResponse {}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

enum UserType {
  USER_TYPE_UNSPECIFIED = 0;
  USER_TYPE_HUMAN = 1;
  USER_TYPE_AGENT = 2;
}

message User {
  string id = 1;
  string wallet_address = 2;
  UserType user_type = 3;
  string balance = 4;
  string locked_balance = 5;
  bool is_admin = 6;
  google.protobuf.Timestamp created_at = 7;
}
