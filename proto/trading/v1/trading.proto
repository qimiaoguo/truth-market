syntax = "proto3";

package trading.v1;

option go_package = "github.com/truthmarket/truth-market/proto/gen/go/trading/v1;tradingv1";

import "google/protobuf/timestamp.proto";

service TradingService {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc MintTokens(MintTokensRequest) returns (MintTokensResponse);
  rpc GetPositions(GetPositionsRequest) returns (GetPositionsResponse);
  rpc GetOrderbook(GetOrderbookRequest) returns (GetOrderbookResponse);
  rpc CancelAllOrdersByMarket(CancelAllOrdersByMarketRequest) returns (CancelAllOrdersByMarketResponse);
}

message PlaceOrderRequest {
  string user_id = 1;
  string market_id = 2;
  string outcome_id = 3;
  OrderSide side = 4;
  string price = 5;
  string quantity = 6;
}

message PlaceOrderResponse {
  Order order = 1;
  repeated Trade trades = 2;
}

message CancelOrderRequest {
  string user_id = 1;
  string order_id = 2;
}

message CancelOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message ListOrdersRequest {
  string user_id = 1;
  string market_id = 2;
  OrderStatus status = 3;
  int32 page = 4;
  int32 per_page = 5;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int64 total = 2;
}

message MintTokensRequest {
  string user_id = 1;
  string market_id = 2;
  string quantity = 3;
}

message MintTokensResponse {
  repeated Position positions = 1;
  string cost = 2;
}

message GetPositionsRequest {
  string user_id = 1;
  string market_id = 2;
}

message GetPositionsResponse {
  repeated Position positions = 1;
}

message GetOrderbookRequest {
  string market_id = 1;
  string outcome_id = 2;
}

message GetOrderbookResponse {
  repeated OrderbookLevel bids = 1;
  repeated OrderbookLevel asks = 2;
}

message OrderbookLevel {
  string price = 1;
  string quantity = 2;
  int32 order_count = 3;
}

message CancelAllOrdersByMarketRequest {
  string market_id = 1;
}

message CancelAllOrdersByMarketResponse {
  int64 cancelled_count = 1;
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_OPEN = 1;
  ORDER_STATUS_PARTIALLY_FILLED = 2;
  ORDER_STATUS_FILLED = 3;
  ORDER_STATUS_CANCELLED = 4;
}

message Order {
  string id = 1;
  string user_id = 2;
  string market_id = 3;
  string outcome_id = 4;
  OrderSide side = 5;
  string price = 6;
  string quantity = 7;
  string filled_quantity = 8;
  OrderStatus status = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message Trade {
  string id = 1;
  string market_id = 2;
  string outcome_id = 3;
  string maker_order_id = 4;
  string taker_order_id = 5;
  string maker_user_id = 6;
  string taker_user_id = 7;
  string price = 8;
  string quantity = 9;
  google.protobuf.Timestamp created_at = 10;
}

message Position {
  string id = 1;
  string user_id = 2;
  string market_id = 3;
  string outcome_id = 4;
  string quantity = 5;
  string avg_price = 6;
  google.protobuf.Timestamp updated_at = 7;
}
