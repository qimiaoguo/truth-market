syntax = "proto3";

package market.v1;

option go_package = "github.com/truthmarket/truth-market/proto/gen/go/market/v1;marketv1";

import "google/protobuf/timestamp.proto";

service MarketService {
  rpc CreateMarket(CreateMarketRequest) returns (CreateMarketResponse);
  rpc GetMarket(GetMarketRequest) returns (GetMarketResponse);
  rpc ListMarkets(ListMarketsRequest) returns (ListMarketsResponse);
  rpc UpdateMarketStatus(UpdateMarketStatusRequest) returns (UpdateMarketStatusResponse);
  rpc ResolveMarket(ResolveMarketRequest) returns (ResolveMarketResponse);
  rpc CancelMarket(CancelMarketRequest) returns (CancelMarketResponse);
}

message CreateMarketRequest {
  string title = 1;
  string description = 2;
  MarketType market_type = 3;
  string category = 4;
  repeated string outcome_labels = 5;
  google.protobuf.Timestamp end_time = 6;
  string created_by = 7;
}

message CreateMarketResponse {
  Market market = 1;
}

message GetMarketRequest {
  string market_id = 1;
}

message GetMarketResponse {
  Market market = 1;
}

message ListMarketsRequest {
  MarketStatus status = 1;
  string category = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message ListMarketsResponse {
  repeated Market markets = 1;
  int64 total = 2;
}

message UpdateMarketStatusRequest {
  string market_id = 1;
  MarketStatus status = 2;
}

message UpdateMarketStatusResponse {
  Market market = 1;
}

message ResolveMarketRequest {
  string market_id = 1;
  string winning_outcome_id = 2;
  string resolved_by = 3;
}

message ResolveMarketResponse {
  Market market = 1;
}

message CancelMarketRequest {
  string market_id = 1;
  string cancelled_by = 2;
}

message CancelMarketResponse {
  Market market = 1;
}

enum MarketType {
  MARKET_TYPE_UNSPECIFIED = 0;
  MARKET_TYPE_BINARY = 1;
  MARKET_TYPE_MULTI = 2;
}

enum MarketStatus {
  MARKET_STATUS_UNSPECIFIED = 0;
  MARKET_STATUS_DRAFT = 1;
  MARKET_STATUS_OPEN = 2;
  MARKET_STATUS_CLOSED = 3;
  MARKET_STATUS_RESOLVED = 4;
  MARKET_STATUS_CANCELLED = 5;
}

message Market {
  string id = 1;
  string title = 2;
  string description = 3;
  MarketType market_type = 4;
  string category = 5;
  MarketStatus status = 6;
  repeated Outcome outcomes = 7;
  string created_by = 8;
  google.protobuf.Timestamp end_time = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp resolved_at = 11;
}

message Outcome {
  string id = 1;
  string market_id = 2;
  string label = 3;
  int32 index = 4;
  bool is_winner = 5;
}
