parameters:
  PageParam:
    name: page
    in: query
    required: false
    description: Page number for pagination (1-indexed). Defaults to 1.
    schema:
      type: integer
      minimum: 1
      default: 1
    examples:
      default:
        value: 1
        summary: First page

  PerPageParam:
    name: per_page
    in: query
    required: false
    description: Number of items to return per page. Defaults to 20, max 100.
    schema:
      type: integer
      minimum: 1
      maximum: 100
      default: 20
    examples:
      default:
        value: 20
        summary: Default page size

  MarketIdQueryParam:
    name: market_id
    in: query
    required: false
    description: Filter results to a specific market by its UUID.
    schema:
      type: string
      format: uuid
    examples:
      default:
        value: "d290f1ee-6c54-4b01-90e6-d701748f0851"
        summary: Example market ID

  MarketIdPathParam:
    name: id
    in: path
    required: true
    description: Unique market identifier.
    schema:
      type: string
      format: uuid
    examples:
      default:
        value: "d290f1ee-6c54-4b01-90e6-d701748f0851"
        summary: Example market ID

  OrderIdPathParam:
    name: id
    in: path
    required: true
    description: Unique order identifier.
    schema:
      type: string
      format: uuid
    examples:
      default:
        value: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
        summary: Example order ID

  ApiKeyIdPathParam:
    name: id
    in: path
    required: true
    description: Unique API key identifier.
    schema:
      type: string
      format: uuid
    examples:
      default:
        value: "c56a4180-65aa-42ec-a945-5fd21dec0538"
        summary: Example API key ID

  UserIdPathParam:
    name: id
    in: path
    required: true
    description: Unique user identifier.
    schema:
      type: string
      format: uuid
    examples:
      default:
        value: "a3bb189e-8bf9-3888-9912-ace4e6543002"
        summary: Example user ID
