name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  # ──────────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────────
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint (pkg)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: pkg
      - name: golangci-lint (infra)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: infra
      - name: golangci-lint (gateway)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/gateway
      - name: golangci-lint (auth-svc)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/auth-svc
      - name: golangci-lint (market-svc)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/market-svc
      - name: golangci-lint (trading-svc)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/trading-svc
      - name: golangci-lint (ranking-svc)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/ranking-svc

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: ESLint
        run: cd frontend && pnpm lint

  lint-proto:
    name: Lint Proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - name: buf lint
        run: cd proto && buf lint
      - name: buf breaking
        if: github.event_name == 'pull_request'
        run: cd proto && buf breaking --against '.git#branch=main'

  lint-openapi:
    name: Lint OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Lint OpenAPI spec
        run: npx @redocly/cli lint api/openapi.yaml

  # ──────────────────────────────────────────────────
  # Test — Go
  # ──────────────────────────────────────────────────
  test-go:
    name: Test Go (${{ matrix.module }})
    needs: [lint-go]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg
          - infra
          - services/gateway
          - services/auth-svc
          - services/market-svc
          - services/trading-svc
          - services/ranking-svc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: cd ${{ matrix.module }} && go test ./... -v -race -short -count=1 -coverprofile=coverage.out
      - name: Coverage summary
        run: cd ${{ matrix.module }} && go tool cover -func=coverage.out | grep total || true

  # ──────────────────────────────────────────────────
  # Test — Frontend
  # ──────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    needs: [lint-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Run vitest
        run: cd frontend && pnpm test:run

  # ──────────────────────────────────────────────────
  # Test — SDKs
  # ──────────────────────────────────────────────────
  test-sdk-typescript:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: cd sdks/typescript && npm install
      - name: Run vitest
        run: cd sdks/typescript && npm test

  test-sdk-python:
    name: Test Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd sdks/python
          pip install -e ".[dev]"
      - name: Run pytest
        run: cd sdks/python && pytest -v

  # ──────────────────────────────────────────────────
  # Build — verify everything compiles
  # ──────────────────────────────────────────────────
  build-go:
    name: Build Go (${{ matrix.service }})
    needs: [test-go]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - auth-svc
          - market-svc
          - trading-svc
          - ranking-svc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build service binary
        run: cd services/${{ matrix.service }} && CGO_ENABLED=0 go build -o /dev/null ./cmd/main.go

  build-frontend:
    name: Build Frontend
    needs: [test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Build Next.js
        run: cd frontend && pnpm build
